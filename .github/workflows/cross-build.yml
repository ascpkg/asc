name: Build Targets

on:
  workflow_dispatch:
  push:
    # branches: ["workflows"]
    tags:
      - '20*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils
          cargo install cross

      - name: Build aarch64-unknown-linux-musl
        run: |
          cross build --release --target aarch64-unknown-linux-musl
          mkdir -p asc-aarch64-unknown-linux-musl-tag
          cp target/aarch64-unknown-linux-musl/release/asc asc-aarch64-unknown-linux-musl-tag/

      - name: Build x86_64-unknown-linux-musl
        run: |
          cross build --release --target x86_64-unknown-linux-musl
          mkdir -p asc-x86_64-unknown-linux-musl-tag
          cp target/x86_64-unknown-linux-musl/release/asc asc-x86_64-unknown-linux-musl-tag/

      - name: Build aarch64-pc-windows-msvc
        run: |
          cross build --release --target aarch64-pc-windows-msvc
          mkdir -p asc-aarch64-pc-windows-msvc-tag
          cp target/aarch64-pc-windows-msvc/release/asc.exe asc-aarch64-pc-windows-msvc-tag/

      - name: Build x86_64-pc-windows-msvc
        run: |
          cross build --release --target x86_64-pc-windows-msvc
          mkdir -p asc-x86_64-pc-windows-msvc-tag
          cp target/x86_64-pc-windows-msvc/release/asc.exe asc-x86_64-pc-windows-msvc-tag/

      - name: Build aarch64-apple-darwin
        run: |
          cargo build-docker-image aarch64-apple-darwin-cross
          cross build --release --target aarch64-apple-darwin
          mkdir -p asc-aarch64-apple-darwin-tag
          cp target/aarch64-apple-darwin/release/asc asc-aarch64-apple-darwin-tag/

      - name: Build x86_64-apple-darwin
        run: |
          cargo build-docker-image x86_64-apple-darwin-cross
          cross build --release --target x86_64-apple-darwin
          mkdir -p asc-x86_64-apple-darwin-tag
          cp target/x86_64-apple-darwin/release/asc asc-x86_64-apple-darwin-tag/

      - name: Package binaries
        run: |
          tar -cJf asc-aarch64-unknown-linux-musl-tag.tar.xz asc-aarch64-unknown-linux-musl-tag
          tar -cJf asc-x86_64-unknown-linux-musl-tag.tar.xz asc-x86_64-unknown-linux-musl-tag
          tar -cJf asc-aarch64-pc-windows-msvc-tag.tar.xz asc-aarch64-pc-windows-msvc-tag
          tar -cJf asc-x86_64-pc-windows-msvc-tag.tar.xz asc-x86_64-pc-windows-msvc-tag
          tar -cJf asc-aarch64-apple-darwin-tag.tar.xz asc-aarch64-apple-darwin-tag
          tar -cJf asc-x86_64-apple-darwin-tag.tar.xz asc-x86_64-apple-darwin-tag

      - name: Upload to GitHub Releases
        uses: actions/upload-release@v4
        with:
          tag: ${{ github.ref }}
          files: |
            asc-aarch64-unknown-linux-musl-tag.tar.xz
            asc-x86_64-unknown-linux-musl-tag.tar.xz
            asc-aarch64-pc-windows-msvc-tag.tar.xz
            asc-x86_64-pc-windows-msvc-tag.tar.xz
            asc-aarch64-apple-darwin-tag.tar.xz
            asc-x86_64-apple-darwin-tag.tar.xz